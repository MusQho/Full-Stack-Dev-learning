<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists and Tables</title>
</head>

<body>
    <h1>Make a List number with "ol"</h1>

    <ol>
        <li>Kecap manis</li>
        <li>Gula</li>
        <li>Tepung</li>
        <li>Lada</li>

    </ol>

    <h1>Make a List symbol with "ul"</h1>
    <p>3 reasons why choose informatics engineering</p>

    <ul>
        <li>To be Full-stack Dev</li>
        <li>Have a big salary</li>
        <li>want because want</li>
    </ul>

    <h1>Make a Tables</h1>

    <table border="1">
        <tr>
            <th>Semester</th>
            <th>IPK</th>
        </tr>
        <tr>
            <td>Semester 1</td>
            <td>4</td>
        </tr>
        <tr>
            <td>Semester 2</td>
            <td>4</td>
        </tr>
        <tr>
            <td>Semester 3</td>
            <td>4</td>
        </tr>
    </table>
</body>

</html>
